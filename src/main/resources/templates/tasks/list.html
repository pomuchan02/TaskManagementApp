<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>タスク一覧</title>
    </head>
    <body>
        <h1>タスク一覧</h1>

        <a href="/tasks/new">
            <button type="button">登録</button>
        </a>

        <div th:if="${#lists.isEmpty(tasks)}">
            <p>タスクはまだありません</p>
        </div>

        <table th:if="${!#lists.isEmpty(tasks)}" border="1">
            <thead>
                <tr>
                    <th>タイトル</th>
                    <th>ステータス</th>
                    <th>期限</th>
                    <th>アクション</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="task : ${tasks}">
                    <td th:text="${task.title}">タイトル</td>
                    <td th:text="${task.status}">ステータス</td>
                    <td th:text="${task.limitDate}">期限</td>
                    <td>
                        <a th:href="@{/tasks/{id}/edit(id=${task.id})}">
                            <button type="button">編集</button>
                        </a>
                        <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" style="display:inline;">
                            <button type="submit" onclick="return confirm('削除してよろしいですか？');">削除</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
